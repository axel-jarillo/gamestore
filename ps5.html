<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | GameStore</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="contenedor">

    <header>

        <a href="consolas.html">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <i class="fa-solid fa-heart"></i>

    </header>

    <section class="ps5">

        <div class="imagen">

            <img src="img/ps5.jpg" alt="PlayStation 5">

        </div>

        <div class="info">

            <h1 id="nombreProducto">PlayStation 5</h1>

            <h2 id="precioProducto">$10,000</h2>

            <div class="estrellas">
                ★★★★★
                <span>(120)</span>
            </div>

            <p id="descripcionProducto">
                La consola de última generación de Sony.
                Disfruta de gráficos increíbles y velocidad
                ultrarrápida.
            </p>

            <div class="cantidad">

                <label>Cantidad:</label>

<button onclick="restar()">-</button>

<input type="text" id="cantidad" value="1">

<button onclick="sumar()">+</button>

<script src="js/script.js"></script>

                </div>

            </div>

            <div class="botones">


                <button class="btn2">
                    COMPRAR AHORA
                </button>

            </div>

            <div class="descripcion">

                <h3>Descripción</h3>

                <p>
                    PlayStation 5 lleva la experiencia de juego
                    a otro nivel gracias a su CPU, GPU y SSD
                    ultrarrápidos, además de audio 3D y soporte
                    para resolución 4K.
                </p>

            </div>

        </div>

    </section>

</div>

</body>
</html>
