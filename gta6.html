<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | GameStore</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="contenedor">

    <header>

        <a href="videojuegos.html">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <i class="fa-solid fa-heart"></i>

    </header>

    <section class="gtaVI">

        <div class="imagen">

            <img src="img/gta6.jpg" alt="GTA IV">

        </div>

        <div class="info">

            <h1 id="nombreProducto">GTA IV</h1>

            <h2 id="precioProducto">$1599</h2>

            <div class="estrellas">
                ★★★★★
                <span>(120)</span>
            </div>

            <p id="descripcionProducto">
                El nuevo videojuego de la saga Grand theft Auto,
                el GTA IV
            </p>

            <div class="cantidad">

                <label>Cantidad:</label>

<button onclick="restar()">-</button>

<input type="text" id="cantidad" value="1">

<button onclick="sumar()">+</button>

<script src="js/script.js"></script>

                </div>

            </div>

            <div class="botones">


                <button class="btn2">
                    COMPRAR AHORA
                </button>

            </div>

            <div class="descripcion">

                <h3>Descripción</h3>

                <p>
                    GTA IV a la venta de casi 13 años de el ultimo juego
                </p>

            </div>

        </div>

    </section>

</div>

</body>
</html>
